{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#0b1220" />
<title>Hatırlaf — Sesli Günlük</title>
<link rel="stylesheet" href="{% static 'css/app.css' %}" />
</head>
<body class="startup-active">
<section id="startup-screen" class="startup-screen" aria-live="polite">
  <div class="startup-shell">
    <div class="startup-brand-mark">H</div>
    <div class="startup-kicker">Hatırlaf</div>
    <h2 class="startup-title">Sesli günlük hazırlanıyor</h2>
    <p id="startup-detail" class="startup-detail">Modellerin durumu alınıyor.</p>
    <div class="startup-progress-row">
      <div class="startup-progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <div id="startup-progress-fill" class="startup-progress-fill"></div>
      </div>
      <div id="startup-percent" class="startup-percent">0%</div>
    </div>
    <div id="startup-components" class="startup-components"></div>
  </div>
</section>

<div id="app" class="app-shell">
  <header class="app-header">
    <div class="app-header-row">
      <button class="app-back" data-action="back" aria-label="Geri" hidden>&#8592;</button>
      <h1 id="screen-title" class="app-brand">Hatırlaf</h1>
      <span class="app-online" id="online-dot" title="Çevrimiçi">&bull;</span>
    </div>
    <nav class="app-nav" aria-label="Ana gezinti">
      <button class="app-nav-btn" data-route="#/home">Ana</button>
      <button class="app-nav-btn" data-route="#/record">Girişler</button>
      <button class="app-nav-btn" data-route="#/timeline">Takvim</button>
    </nav>
  </header>

  <main id="screen-root" class="screen-root" aria-live="polite"></main>

  <div id="toast-root" class="toast-root" aria-live="polite"></div>
</div>

<script>
  window.HATIRLAF_API_BASE = "/api";
</script>
<script type="module" src="{% static 'js/app.js' %}"></script>
</body>
</html>
